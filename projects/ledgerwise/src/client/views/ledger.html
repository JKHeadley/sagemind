<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('ledgerView', () => ({
    entries: [],
    loading: true,
    page: 1,
    pages: 1,
    total: 0,
    filters: { startDate: startOfYear(), endDate: today(), account: '', project: '', search: '' },
    accounts: [],
    projects: [],

    async load() {
      this.loading = true;
      try {
        const [result, accts, projs] = await Promise.all([
          API.getEntries({ ...this.filters, page: this.page }),
          this.accounts.length ? this.accounts : API.getAccounts(),
          this.projects.length ? this.projects : API.getProjects(),
        ]);
        this.entries = result.entries;
        this.page = result.page;
        this.pages = result.pages;
        this.total = result.total;
        if (Array.isArray(accts)) this.accounts = accts;
        if (Array.isArray(projs)) this.projects = projs;
      } catch (e) { this.$store.app.toast(e, 'error'); }
      finally { this.loading = false; }
    },

    applyFilters() { this.page = 1; this.load(); },
    clearFilters() {
      var dy = this.$store.app.dataYear;
      this.filters = { startDate: dy + '-01-01', endDate: dy + '-12-31', account: '', project: '', search: '' };
      this.page = 1;
      this.load();
    },
    prevPage() { if (this.page > 1) { this.page--; this.load(); } },
    nextPage() { if (this.page < this.pages) { this.page++; this.load(); } },

    getAccountName(code) {
      if (!code) return '';
      var a = this.accounts.find(function(x) { return x.code === code; });
      return a ? code + ' ' + a.name : code;
    },

    _ready: false,
    init() {
      window.addEventListener('view-changed', e => {
        if (e.detail.view === 'ledger') {
          if (!this._ready) {
            var dy = this.$store.app.dataYear;
            this.filters.startDate = dy + '-01-01';
            this.filters.endDate = dy + '-12-31';
            this._ready = true;
          }
          this.load();
        }
      });
    },
  }));
});
</script>

<div x-data="ledgerView" x-show="$store.app.currentView === 'ledger'">
  <h2 class="text-xl font-bold text-gray-900 mb-4">General Ledger</h2>

  <div class="card p-4 mb-4">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      <div>
        <label class="form-label">From</label>
        <input type="date" class="form-input" x-model="filters.startDate" @change="applyFilters()">
      </div>
      <div>
        <label class="form-label">To</label>
        <input type="date" class="form-input" x-model="filters.endDate" @change="applyFilters()">
      </div>
      <div>
        <label class="form-label">Account</label>
        <select class="form-select" x-model="filters.account" @change="applyFilters()">
          <option value="">All</option>
          <template x-for="a in accounts" :key="a.code">
            <option :value="a.code" x-text="a.code + ' ' + a.name"></option>
          </template>
        </select>
      </div>
      <div>
        <label class="form-label">Project</label>
        <select class="form-select" x-model="filters.project" @change="applyFilters()">
          <option value="">All</option>
          <template x-for="p in projects" :key="p.code">
            <option :value="p.code" x-text="p.code + ' ' + p.name"></option>
          </template>
        </select>
      </div>
      <div>
        <label class="form-label">Search</label>
        <input class="form-input" x-model="filters.search" @input.debounce.400ms="applyFilters()" placeholder="Description or memo...">
      </div>
    </div>
    <div class="flex gap-2 mt-3">
      <button class="btn-secondary btn-sm" @click="clearFilters()">Clear Filters</button>
    </div>
  </div>

  <div class="card overflow-x-auto">
    <table class="data-table">
      <thead>
        <tr><th>Date</th><th>Description</th><th>Dr Account</th><th class="text-right">Debit</th><th>Cr Account</th><th class="text-right">Credit</th><th>Project</th><th>Status</th></tr>
      </thead>
      <tbody>
        <template x-for="i in 8" :key="'skel-'+i">
          <tr x-show="loading" class="skeleton-row" :style="'animation-delay:' + (i*80) + 'ms'">
            <td><div class="skeleton-bar" :style="'width:70%;animation-delay:' + (i*80) + 'ms'"></div></td>
            <td><div class="skeleton-bar" :style="'width:' + (40 + (i*7)%40) + '%;animation-delay:' + (i*80) + 'ms'"></div></td>
            <td><div class="skeleton-bar" :style="'width:60%;animation-delay:' + (i*80) + 'ms'"></div></td>
            <td><div class="skeleton-bar" :style="'width:50%;margin-left:auto;animation-delay:' + (i*80) + 'ms'"></div></td>
            <td><div class="skeleton-bar" :style="'width:60%;animation-delay:' + (i*80) + 'ms'"></div></td>
            <td><div class="skeleton-bar" :style="'width:50%;margin-left:auto;animation-delay:' + (i*80) + 'ms'"></div></td>
            <td><div class="skeleton-bar skeleton-bar-badge" :style="'animation-delay:' + (i*80) + 'ms'"></div></td>
            <td><div class="skeleton-bar skeleton-bar-badge" :style="'width:2.5rem;animation-delay:' + (i*80) + 'ms'"></div></td>
          </tr>
        </template>
        <tr x-show="!loading && !entries.length"><td colspan="8" class="text-center py-8 text-gray-400">No entries found</td></tr>
        <template x-for="(e, idx) in entries" :key="idx">
          <tr x-show="!loading">
            <td class="whitespace-nowrap" x-text="formatDateDisplay(e.date)"></td>
            <td class="max-w-xs truncate" x-text="e.description"></td>
            <td class="font-mono text-xs" x-text="getAccountName(e.drAccount)"></td>
            <td class="text-right font-mono" x-text="e.drAmount ? formatMoney(e.drAmount) : ''"></td>
            <td class="font-mono text-xs" x-text="getAccountName(e.crAccount)"></td>
            <td class="text-right font-mono" x-text="e.crAmount ? formatMoney(e.crAmount) : ''"></td>
            <td><span class="badge-gray" x-text="e.project" x-show="e.project"></span></td>
            <td>
              <span :class="e.status === 'OK' ? 'badge-green' : 'badge-yellow'" x-text="e.status"></span>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    <div class="flex items-center justify-between px-4 py-3 border-t border-gray-200">
      <span class="text-sm text-gray-500" x-text="'Page ' + page + ' of ' + pages + ' (' + total + ' entries)'"></span>
      <div class="flex gap-2">
        <button class="btn-secondary btn-sm" @click="prevPage()" :disabled="page <= 1">Prev</button>
        <button class="btn-secondary btn-sm" @click="nextPage()" :disabled="page >= pages">Next</button>
      </div>
    </div>
  </div>
</div>
