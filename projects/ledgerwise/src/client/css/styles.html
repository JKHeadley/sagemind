<style>
  [x-cloak] { display: none !important; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    min-height: 100vh;
    transition: transform 0.3s ease;
  }
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      z-index: 40;
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    transition: background-color 0.15s;
    color: inherit;
  }
  .nav-item:hover { background: rgba(8, 241, 199, 0.08); }
  .nav-item.active { background: rgba(8, 241, 199, 0.15); color: #08f1c7; }

  /* Money formatting */
  .money-positive { color: #008276; }
  .money-negative { color: #dc2626; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 50;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    box-shadow: 0 10px 15px rgba(0,0,0,0.1);
    font-size: 0.875rem;
    font-weight: 500;
    animation: slideUp 0.3s ease;
  }
  .toast-success { background: #008276; color: #fff; }
  .toast-error { background: #dc2626; color: #fff; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Skeleton loading with shimmer */
  .skeleton {
    background: linear-gradient(90deg, rgba(0,130,118,0.10) 25%, rgba(8,241,199,0.10) 50%, rgba(0,130,118,0.10) 75%);
    background-size: 200% 100%;
    border-radius: 0.25rem;
    animation: shimmer 1.5s ease-in-out infinite;
  }
  .skeleton-row td { padding: 0.75rem 1.25rem !important; }
  .skeleton-bar {
    height: 0.875rem;
    border-radius: 0.25rem;
    background: linear-gradient(90deg, rgba(0,130,118,0.10) 25%, rgba(8,241,199,0.10) 50%, rgba(0,130,118,0.10) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
  }
  .skeleton-bar-sm { height: 0.625rem; }
  .skeleton-bar-badge { height: 1.25rem; width: 3rem; border-radius: 9999px; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Loading spinner */
  .spinner { color: #08f1c7; }

  /* Buttons */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #fff;
    background: #008276;
    transition: background-color 0.15s;
    cursor: pointer;
    border: none;
  }
  .btn-primary:hover { background: #014f4f; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
    background: #fff;
    border: 1px solid #d1d5db;
    transition: background-color 0.15s;
    cursor: pointer;
  }
  .btn-secondary:hover { background: #f3f4f6; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-danger {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #fff;
    background: #dc2626;
    transition: background-color 0.15s;
    cursor: pointer;
    border: none;
  }
  .btn-danger:hover { background: #b91c1c; }

  .btn-sm {
    padding: 0.25rem 0.75rem;
    font-size: 0.8125rem;
  }

  /* Cards */
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 0.5rem;
  }

  /* Badges */
  .badge-green {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(0, 130, 118, 0.1);
    color: #008276;
  }
  .badge-red {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(220, 38, 38, 0.1);
    color: #dc2626;
  }
  .badge-yellow {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(217, 119, 6, 0.1);
    color: #d97706;
  }
  .badge-gray {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: #f3f4f6;
    color: #6b7280;
  }
  .badge-ai {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(139, 92, 246, 0.1);
    color: #7c3aed;
  }

  /* Confidence bar */
  .confidence-bar {
    height: 6px;
    border-radius: 3px;
    background: #e5e7eb;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .confidence-high { background: #008276; }
  .confidence-medium { background: #d97706; }
  .confidence-low { background: #dc2626; }

  /* Filter pills */
  .filter-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.25rem 0.75rem;
    border-radius: 9999px;
    font-size: 0.8125rem;
    font-weight: 500;
    border: 1px solid #d1d5db;
    background: #fff;
    color: #6b7280;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-pill.active {
    background: #008276;
    border-color: #008276;
    color: #fff;
  }
  .filter-pill:hover:not(.active) {
    border-color: #9ca3af;
  }

  /* Form focus states */
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #08f1c7;
    box-shadow: 0 0 0 3px rgba(8, 241, 199, 0.15);
  }

  /* KPI Cards */
  .kpi-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 0.5rem;
    padding: 1.25rem;
  }
  .kpi-label {
    font-size: 0.8125rem;
    color: #6b7280;
    font-weight: 500;
  }
  .kpi-value {
    font-size: 1.5rem;
    font-weight: 700;
    margin-top: 0.25rem;
  }

  /* Data Table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }
  .data-table th {
    padding: 0.75rem 1.25rem;
    text-align: left;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    font-weight: 600;
    border-bottom: 1px solid #e5e7eb;
    background: #f9fafb;
  }
  .data-table td {
    padding: 0.625rem 1.25rem;
    border-bottom: 1px solid #f3f4f6;
    color: #374151;
  }
  .data-table tbody tr:hover {
    background: #f9fafb;
  }

  /* Table utility (Tailwind table-auto override) */
  .table-auto th {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    font-weight: 600;
  }
</style>
